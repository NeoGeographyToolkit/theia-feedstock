{% set name = "theia" %}
{% set version = "0.7.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  # ASP: NeoGeographyToolkit/TheiaSfM pinned to the MultiView submodule SHA.
  url: https://github.com/NeoGeographyToolkit/TheiaSfM/archive/1477732a1beee54b82f48b9d851d1471ad775f9b.tar.gz
  sha256: d5a8383b6aba4814f2db832b52e9d599b411873067efded8da1adea3dd4d9ef5

build:
  number: 3
  string: asp_3_{{ target_platform | replace("-", "_") }}      # ASP channel marker; bump to re-spin (append-only)
  skip: true  # [win]

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cmake
    - make
  host:
    - eigen >=3,<4
    - gflags
    - glog
    # ceres MUST be the SuiteSparse variant (TheiaSfM: find_package(Ceres
    # REQUIRED SuiteSparse)). Pin the exact per-platform build hash, else the
    # solver silently picks a non-SuiteSparse (cpulgpl) ceres -> link/runtime
    # failure. aarch64 build = hae81a69_2 (suitesparse 5.x), resolved 2026-06-05.
    - ceres-solver 2.2.0 h036b7f2_2  # [osx and arm64]
    - ceres-solver 2.2.0 haa0d064_2  # [osx and x86_64]
    - ceres-solver 2.2.0 h30ec75d_2  # [linux and not aarch64]
    - ceres-solver 2.2.0 hae81a69_2  # [aarch64]
    - suitesparse <7.7.0
    - rocksdb <10        # [linux]
    - rocksdb 10.10.1    # [osx]
    - rapidjson
    # Pin libopencv + libprotobuf to the asp_deps/ISIS stack. The latest
    # libopencv 4.12 build links libprotobuf 6.33 (+ newer libabseil/imath/
    # double-conversion), which conflicts with asp_deps (libprotobuf 6.31.1,
    # libabseil 20250512) at install. Pinning libprotobuf 6.31.1 forces the
    # compatible opencv build.
    - libopencv 4.12.*
    - libprotobuf 6.31.1
    - flann
    - tbb       # ceres cmake config requires TBB::tbb target
    - vlfeat    # external SIFT (theia includes vl/sift.h, links -lvl)
  run:
    - gflags
    - glog
    - ceres-solver 2.2.0 h036b7f2_2  # [osx and arm64]
    - ceres-solver 2.2.0 haa0d064_2  # [osx and x86_64]
    - ceres-solver 2.2.0 h30ec75d_2  # [linux and not aarch64]
    - ceres-solver 2.2.0 hae81a69_2  # [aarch64]
    - suitesparse <7.7.0
    - rocksdb <10        # [linux]
    - rocksdb 10.10.1    # [osx]
    - libopencv 4.12.*
    - flann
    - rapidjson
    - vlfeat

test:
  commands:
    - test -e $PREFIX/bin/build_reconstruction   # [unix]
    - test -e $PREFIX/lib/libtheia${SHLIB_EXT}   # [unix]

about:
  home: https://github.com/NeoGeographyToolkit/TheiaSfM
  license: BSD-3-Clause
  license_file: license.txt
  summary: "TheiaSfM (NeoGeographyToolkit fork): structure-from-motion library used by the Ames Stereo Pipeline."

extra:
  recipe-maintainers:
    - oleg-alexandrov
